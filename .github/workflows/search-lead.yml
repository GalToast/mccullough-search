name: Search Lead

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: 'single-lead or compare-ground-truth'
        required: true
        type: choice
        default: compare-ground-truth
        options:
          - compare-ground-truth
          - single-lead
      lead_name:
        description: 'Business name to search'
        required: false
        type: string
        default: ''
      city:
        description: 'City for location context'
        required: false
        type: string
        default: ''
      state:
        description: 'State (e.g., TX)'
        required: false
        type: string
        default: 'TX'
      zip_code:
        description: 'ZIP code for location context'
        required: false
        type: string
        default: ''
      max_queries:
        description: 'Max search queries per lead'
        required: false
        type: number
        default: 8
      min_score:
        description: 'Minimum score threshold'
        required: false
        type: number
        default: 15
      engine_profile:
        description: 'Engine profile for single-lead runs'
        required: false
        type: choice
        default: full-primary
        options:
          - full-primary
          - text-primary
      compare_engine_profiles:
        description: 'Compare text-primary vs full-primary in compare mode'
        required: false
        type: boolean
        default: true
      ground_truth_file:
        description: 'Ground truth file for compare mode'
        required: false
        type: string
        default: './ground-truth-fresh.json'
      concurrency:
        description: 'Parallel workers for compare mode'
        required: false
        type: number
        default: 4

jobs:
  search:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Start SearXNG
        run: |
          docker run -d --name searxng-ci \
            -p 8888:8080 \
            -e SEARXNG_BASE_URL=http://localhost:8080/ \
            -e SEARXNG_SECRET="${{ secrets.SEARXNG_SECRET }}" \
            searxng/searxng:latest

      - name: Wait for SearXNG
        run: |
          echo "Waiting for SearXNG to answer /config..."
          for i in {1..45}; do
            if curl -fsS http://localhost:8888/config > /dev/null; then
              echo "SearXNG is ready!"
              break
            fi
            echo "Waiting... ($i/45)"
            sleep 3
          done

          curl -fsS http://localhost:8888/config > /dev/null
      
      - name: Run search
        env:
          SEARXNG_URL: http://localhost:8888
        run: |
          set -euo pipefail

          if [ "${{ inputs.run_mode }}" = "compare-ground-truth" ]; then
            if [ "${{ inputs.compare_engine_profiles }}" = "true" ]; then
              node test-harness.js \
                --ground-truth="${{ inputs.ground_truth_file }}" \
                --compare-engine-profiles \
                --concurrency="${{ inputs.concurrency }}"
            else
              node test-harness.js \
                --ground-truth="${{ inputs.ground_truth_file }}" \
                --engine-profile="${{ inputs.engine_profile }}" \
                --concurrency="${{ inputs.concurrency }}"
            fi

            echo "=== TEST RESULTS ==="
            cat test-results.json
            echo "=== VERIFICATION QUEUE ==="
            cat verification-queue.json
          else
            node search-lead.js \
              --lead "${{ inputs.lead_name }}" \
              --city "${{ inputs.city }}" \
              --state "${{ inputs.state }}" \
              --zip "${{ inputs.zip_code }}" \
              --max-queries ${{ inputs.max_queries }} \
              --min-score ${{ inputs.min_score }} \
              --engine-profile "${{ inputs.engine_profile }}" \
              --json > search-result.json

            echo "=== SEARCH RESULT ==="
            cat search-result.json
          fi
      
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: search-artifacts
          path: |
            search-result.json
            test-results.json
            verification-queue.json
            ground-truth-fresh.json
          if-no-files-found: ignore
          retention-days: 1

      - name: Dump SearXNG logs
        if: always()
        run: docker logs searxng-ci || true

      - name: Stop SearXNG
        if: always()
        run: docker rm -f searxng-ci || true
