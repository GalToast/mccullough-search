name: Search Lead

on:
  workflow_dispatch:
    inputs:
      lead_name:
        description: 'Business name to search'
        required: true
        type: string
      city:
        description: 'City for location context'
        required: false
        type: string
        default: ''
      state:
        description: 'State (e.g., TX)'
        required: false
        type: string
        default: 'TX'
      zip_code:
        description: 'ZIP code for location context'
        required: false
        type: string
        default: ''
      max_queries:
        description: 'Max search queries per lead'
        required: false
        type: number
        default: 3
      min_score:
        description: 'Minimum score threshold'
        required: false
        type: number
        default: 15

jobs:
  search:
    runs-on: ubuntu-latest
    
    services:
      searxng:
        image: searxng/searxng:latest
        ports:
          - 8888:8080
        env:
          SEARXNG_BASE_URL: http://localhost:8080/
          SEARXNG_SECRET: ${{ secrets.SEARXNG_SECRET }}
        options: >-
          --health-cmd "curl -f http://localhost:8080/ || exit 1"
          --health-interval 30s
          --health-timeout 10s
          --health-retries 3
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Wait for SearXNG
        run: |
          echo "Waiting for SearXNG to be ready..."
          for i in {1..30}; do
            if curl -s http://localhost:8888/ > /dev/null; then
              echo "SearXNG is ready!"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
      
      - name: Run search
        env:
          SEARXNG_URL: http://localhost:8888
        run: |
          node search-lead.js \
            --lead "${{ inputs.lead_name }}" \
            --city "${{ inputs.city }}" \
            --state "${{ inputs.state }}" \
            --zip "${{ inputs.zip_code }}" \
            --max-queries ${{ inputs.max_queries }} \
            --min-score ${{ inputs.min_score }} \
            --json > search-result.json
          
          echo "=== SEARCH RESULT ==="
          cat search-result.json
      
      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: search-result
          path: search-result.json
          retention-days: 1